<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Relatórios</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { padding: 32px; max-width: 1100px; margin: 0 auto; }
        .voltar { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); margin-bottom: 24px; }
        .relatorio-card { margin-bottom: 32px; }
        .relatorio-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .relatorio-titulo { font-size: 16px; font-weight: 700; }
        .relatorio-subtitulo { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .opcoes { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; padding: 16px; background: var(--bg-input); border-radius: var(--radius-sm); }
        .opcao-check { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
        .opcao-check input { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }
        .acoes-export { display: flex; gap: 8px; }
        .btn-xls { background: #1d6f42; color: #fff; padding: 8px 16px; font-size: 13px; }
        .btn-pdf { background: #c0392b; color: #fff; padding: 8px 16px; font-size: 13px; }
        .preview-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .preview-wrap table { margin: 0; }
        .preview-wrap th { background: var(--bg-input); position: sticky; top: 0; }
        .preview-wrap td { font-size: 13px; }
        .contador { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .toggle-st-wrap { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
        .toggle-st-wrap.ressarcido { color: var(--accent-2); font-weight: 600; }
    </style>
</head>
<body>
<script src="/js/theme.js"></script>

<button class="voltar" onclick="window.location.href='/produtos.html'">← Voltar</button>

<div class="topo">
    <div>
        <h1>Relatórios</h1>
        <p>Gere e exporte relatórios do seu mix de produtos.</p>
    </div>
    <div class="topo-acoes">
        <div class="toggle-st-wrap" id="toggle-st-wrap">
            <label class="toggle">
                <input type="checkbox" id="toggle-st" onchange="alternarST()">
                <span class="toggle-slider"></span>
            </label>
            <span id="label-st">ST Padrão</span>
        </div>
        <button id="btn-tema" onclick="alternarTema()">☀</button>
    </div>
</div>

<div class="card relatorio-card">
    <div class="relatorio-header">
        <div>
            <div class="relatorio-titulo">Contagem de Mix</div>
            <div class="relatorio-subtitulo">Listagem completa ordenada por marca e nome</div>
        </div>
        <div class="acoes-export">
            <button class="btn-xls" onclick="exportarXLS()">⬇ Excel</button>
            <button class="btn-pdf" onclick="exportarPDF()">⬇ PDF</button>
        </div>
    </div>

    <div class="opcoes">
        <span style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px">Colunas opcionais:</span>
        <label class="opcao-check"><input type="checkbox" id="col-custo" onchange="renderizar()"> Custo Aquisição</label>
        <label class="opcao-check"><input type="checkbox" id="col-classico" onchange="renderizar()" checked> Preço Clássico</label>
        <label class="opcao-check"><input type="checkbox" id="col-premium" onchange="renderizar()" checked> Preço Premium</label>
        <label class="opcao-check"><input type="checkbox" id="col-margem-cl" onchange="renderizar()" checked> Margem Clássico</label>
        <label class="opcao-check"><input type="checkbox" id="col-margem-pr" onchange="renderizar()"> Margem Premium</label>
        <label class="opcao-check"><input type="checkbox" id="col-custo-total" onchange="renderizar()"> Custo Total</label>
    </div>

    <div class="contador" id="contador">0 produtos</div>
    <div class="preview-wrap">
        <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/calculosFiscais.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
let produtos = [];
let stRessarcido = localStorage.getItem('st_ressarcido') === 'true';

function aplicarToggleST() {
    document.getElementById('toggle-st').checked = stRessarcido;
    const wrap = document.getElementById('toggle-st-wrap');
    const label = document.getElementById('label-st');
    if (stRessarcido) {
        wrap.classList.add('ressarcido');
        label.textContent = '⚡ ST Ressarcido';
    } else {
        wrap.classList.remove('ressarcido');
        label.textContent = 'ST Padrão';
    }
}

function alternarST() {
    stRessarcido = document.getElementById('toggle-st').checked;
    localStorage.setItem('st_ressarcido', stRessarcido);
    aplicarToggleST();
    renderizar();
}

function fmt(v) { return 'R$ ' + Number(v).toFixed(2).replace('.', ','); }
function fmtPct(v) { return Number(v).toFixed(2).replace('.', ',') + '%'; }

function calcular(p) {
    return calcularPrecificacao({
        custo: p.custo, icms_entrada: p.icms_entrada, icms_saida: p.icms_saida,
        ipi: p.ipi, difal: p.difal, st: p.st, frete_ml: p.frete_ml,
        preco_classico: p.preco_classico, preco_premium: p.preco_premium,
        flag_simulacao_st: stRessarcido
    });
}

function getColunas() {
    return [
        { id: 'sku',          label: 'SKU',              sempre: true },
        { id: 'marca',        label: 'Marca',            sempre: true },
        { id: 'nome',         label: 'Produto',          sempre: true },
        { id: 'custo',        label: 'Custo Aquisição',  check: 'col-custo' },
        { id: 'classico',     label: 'Preço Clássico',   check: 'col-classico' },
        { id: 'premium',      label: 'Preço Premium',    check: 'col-premium' },
        { id: 'margem_cl',    label: 'Margem Clássico',  check: 'col-margem-cl' },
        { id: 'margem_pr',    label: 'Margem Premium',   check: 'col-margem-pr' },
        { id: 'custo_total',  label: 'Custo Total',      check: 'col-custo-total' },
    ].filter(c => c.sempre || document.getElementById(c.check).checked);
}

function getLinhas() {
    return [...produtos]
        .sort((a, b) => {
            const ma = (a.marca_nome || '').toLowerCase();
            const mb = (b.marca_nome || '').toLowerCase();
            if (ma !== mb) return ma.localeCompare(mb);
            return a.nome.toLowerCase().localeCompare(b.nome.toLowerCase());
        })
        .map(p => {
            const r = calcular(p);
            return {
                sku: p.sku || '—',
                marca: p.marca_nome || '—',
                nome: p.nome,
                custo: fmt(p.custo),
                classico: fmt(p.preco_classico),
                premium: fmt(p.preco_premium),
                margem_cl: fmtPct(r.classico.margem),
                margem_pr: fmtPct(r.premium.margem),
                custo_total: fmt(r.classico.custoTotal),
                _margem_cl_num: r.classico.margem,
                _margem_pr_num: r.premium.margem,
            };
        });
}

function renderizar() {
    const colunas = getColunas();
    const linhas = getLinhas();

    document.getElementById('contador').textContent = linhas.length + ' produto' + (linhas.length !== 1 ? 's' : '');

    document.getElementById('thead').innerHTML = `<tr>${colunas.map(c => `<th>${c.label}</th>`).join('')}</tr>`;

    document.getElementById('tbody').innerHTML = linhas.map(l => `
        <tr>${colunas.map(c => {
            let val = l[c.id];
            let cor = '';
            if (c.id === 'margem_cl') cor = l._margem_cl_num >= 0 ? 'color:var(--success)' : 'color:var(--danger)';
            if (c.id === 'margem_pr') cor = l._margem_pr_num >= 0 ? 'color:var(--success)' : 'color:var(--danger)';
            return `<td style="${cor}">${val}</td>`;
        }).join('')}</tr>
    `).join('');
}

function exportarXLS() {
    const colunas = getColunas();
    const linhas = getLinhas();
    const dados = [
        colunas.map(c => c.label),
        ...linhas.map(l => colunas.map(c => l[c.id]))
    ];
    const ws = XLSX.utils.aoa_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Mix');
    XLSX.writeFile(wb, 'contagem-mix.xlsx');
}

function exportarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape' });
    const colunas = getColunas();
    const linhas = getLinhas();

    doc.setFontSize(14);
    doc.text('Contagem de Mix', 14, 16);
    doc.setFontSize(9);
    doc.setTextColor(150);
    doc.text('Ordenado por Marca › Nome  |  ' + (stRessarcido ? 'ST Ressarcido' : 'ST Padrão'), 14, 22);

    doc.autoTable({
        startY: 26,
        head: [colunas.map(c => c.label)],
        body: linhas.map(l => colunas.map(c => l[c.id])),
        styles: { fontSize: 8, cellPadding: 3 },
        headStyles: { fillColor: [40, 40, 60], textColor: 255, fontStyle: 'bold' },
        alternateRowStyles: { fillColor: [245, 245, 250] },
        didParseCell(data) {
            if (data.section === 'body') {
                const col = colunas[data.column.index];
                const linha = linhas[data.row.index];
                if (col.id === 'margem_cl') data.cell.styles.textColor = linha._margem_cl_num >= 0 ? [30,150,80] : [200,50,50];
                if (col.id === 'margem_pr') data.cell.styles.textColor = linha._margem_pr_num >= 0 ? [30,150,80] : [200,50,50];
            }
        }
    });

    doc.save('contagem-mix.pdf');
}

(async () => {
    const usuario = await Api.get('/api/auth/eu');
    if (!usuario) return;
    aplicarToggleST();
    produtos = await Api.get('/api/produtos') || [];
    renderizar();
})();
</script>
</body>
</html>
